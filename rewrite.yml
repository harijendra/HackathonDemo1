---
type: specs.openrewrite.org/v1beta/recipe
name: com.security.UpgradeCommonsLangToLang3
displayName: Upgrade commons-lang 2.6 to commons-lang3 3.17.0
description: Upgrades the vulnerable commons-lang 2.6 library to commons-lang3 3.17.0 and migrates the package namespaces.
recipeList:
  - org.openrewrite.java.dependencies.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: commons-lang
      oldArtifactId: commons-lang
      newGroupId: org.apache.commons
      newArtifactId: commons-lang3
      newVersion: 3.17.0
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.apache.commons.lang
      newPackageName: org.apache.commons.lang3
      recursive: true
  # Note: Manual audit of SerializationUtils is required following this refactor.