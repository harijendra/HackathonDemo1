---
type: specs.openrewrite.org/v1beta/recipe
name: com.remediation.UpgradeCommonsLang2to3
displayName: Migrate commons-lang 2.6 to commons-lang3 3.14.0
description: Replaces legacy commons-lang 2.x with commons-lang3 and updates package imports.
recipeList:
  - org.openrewrite.java.dependencies.ChangeDependencyGroupIdAndArtifactId:
      oldGroupId: commons-lang
      oldArtifactId: commons-lang
      newGroupId: org.apache.commons
      newArtifactId: commons-lang3
      newVersion: 3.14.0
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.apache.commons.lang
      newPackageName: org.apache.commons.lang3
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.apache.commons.lang.builder
      newPackageName: org.apache.commons.lang3.builder
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.apache.commons.lang.exception
      newPackageName: org.apache.commons.lang3.exception
      recursive: true
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.apache.commons.lang.time
      newPackageName: org.apache.commons.lang3.time
      recursive: true