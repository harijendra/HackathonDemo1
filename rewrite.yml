---
type: specs.openrewrite.org/v1beta/recipe
name: com.org.UpgradeCommonsLang2To3
displayName: Upgrade commons-lang 2.6 to commons-lang3 3.17.0
description: Migrates legacy commons-lang 2.x to commons-lang3 to resolve EOL and security vulnerabilities.
recipeList:
  - org.openrewrite.java.dependencies.UpgradeDependencyVersion:
      groupId: commons-lang
      artifactId: commons-lang
      newVersion: 3.17.0
      newGroupId: org.apache.commons
      newArtifactId: commons-lang3
  - org.openrewrite.java.ChangePackage:
      oldPackageName: org.apache.commons.lang
      newPackageName: org.apache.commons.lang3
      recursive: true
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.apache.commons.lang.StringUtils
      newFullyQualifiedTypeName: org.apache.commons.lang3.StringUtils
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.apache.commons.lang.SerializationUtils
      newFullyQualifiedTypeName: org.apache.commons.lang3.SerializationUtils