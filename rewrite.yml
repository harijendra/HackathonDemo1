---
type: specs.openrewrite.org/v1beta/recipe
name: com.org.UpgradeCommonsLangToLang3
displayName: "Migrate commons-lang to commons-lang3"
description: "Replaces legacy commons-lang 2.x imports with commons-lang3 and upgrades the dependency."
recipeList:
  - org.openrewrite.java.dependencies.RemoveDependency:
      groupId: commons-lang
      artifactId: commons-lang
  - org.openrewrite.java.dependencies.AddDependency:
      groupId: org.apache.commons
      artifactId: commons-lang3
      version: 3.14.0
  - org.openrewrite.java.ChangePackage:
      oldPackagePattern: org.apache.commons.lang..*
      newPackagePattern: org.apache.commons.lang3
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.apache.commons.lang.SerializationUtils
      newFullyQualifiedTypeName: org.apache.commons.lang3.SerializationUtils
  - org.openrewrite.java.ChangeType:
      oldFullyQualifiedTypeName: org.apache.commons.lang.StringUtils
      newFullyQualifiedTypeName: org.apache.commons.lang3.StringUtils